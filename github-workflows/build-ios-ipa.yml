# iOS IPA Build Workflow (with Code Signing)
name: Build iOS IPA

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Build ID'
        required: true
      source_url:
        description: 'Source code download URL'
        required: true
      callback_url:
        description: 'Callback URL for build completion'
        required: false

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Install Certificate and Provisioning Profile
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 12)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo "$P12_BASE64" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # Show installed identities
          echo "=== Installed signing identities ==="
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          # Install provisioning profile with correct UUID filename
          PP_PATH="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PP_PATH"
          TEMP_PP="$RUNNER_TEMP/build.mobileprovision"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$TEMP_PP"

          # Extract UUID from the provisioning profile
          PP_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< "$(/usr/bin/security cms -D -i "$TEMP_PP")")
          PP_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" /dev/stdin <<< "$(/usr/bin/security cms -D -i "$TEMP_PP")")
          echo "Provisioning profile UUID: $PP_UUID"
          echo "Provisioning profile Name: $PP_NAME"

          # Install with UUID as filename (required by Xcode)
          cp "$TEMP_PP" "$PP_PATH/$PP_UUID.mobileprovision"
          echo "Provisioning profile installed"

          # Save for later steps
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "PP_UUID=$PP_UUID" >> $GITHUB_ENV
          echo "PP_NAME=$PP_NAME" >> $GITHUB_ENV
          echo "PP_PATH_FILE=$TEMP_PP" >> $GITHUB_ENV

      - name: Download and Prepare Source
        run: |
          echo "Downloading source from: ${{ inputs.source_url }}"
          curl -L -o source.zip "${{ inputs.source_url }}"
          mkdir -p source
          cd source
          unzip ../source.zip

          PROJ=$(find . -name "*.xcodeproj" -not -path "*/Pods/*" -not -path "*/.build/*" -maxdepth 4 | head -1)
          if [ -z "$PROJ" ]; then
            echo "ERROR: No Xcode project found!"
            exit 1
          fi

          XCODE_DIR=$(dirname "$PROJ" | sed 's|^\./||')
          PROJ_NAME=$(basename "$PROJ")
          echo "Found project: $PROJ"
          echo "Xcode directory: $XCODE_DIR"

          cd "$XCODE_DIR"
          if [ -d "Pods" ]; then
            echo "Pods directory already exists, skipping pod install"
          elif [ -f "Podfile" ]; then
            echo "Podfile found, installing CocoaPods dependencies..."
            pod install --repo-update || pod install
          else
            echo "No Podfile found, skipping CocoaPods"
          fi
          cd -

          WORKSPACE=$(find "$XCODE_DIR" -name "*.xcworkspace" -not -path "*/Pods/*" -not -path "*/.build/*" -not -path "*.xcodeproj/*" -maxdepth 2 | head -1)
          if [ -n "$WORKSPACE" ]; then
            WORKSPACE_NAME=$(basename "$WORKSPACE")
            echo "XCODE_DIR=$XCODE_DIR" >> $GITHUB_ENV
            echo "BUILD_TYPE=workspace" >> $GITHUB_ENV
            echo "WORKSPACE_NAME=$WORKSPACE_NAME" >> $GITHUB_ENV
          else
            echo "XCODE_DIR=$XCODE_DIR" >> $GITHUB_ENV
            echo "BUILD_TYPE=project" >> $GITHUB_ENV
            echo "PROJ_NAME=$PROJ_NAME" >> $GITHUB_ENV
          fi

      - name: Build IPA
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd "source/$XCODE_DIR"

          APP_NAME=$(ls -d *.xcodeproj 2>/dev/null | head -1 | sed 's/.xcodeproj//')
          export APP_NAME
          echo "Project name: $APP_NAME"

          if [ "$BUILD_TYPE" = "workspace" ]; then
            SCHEME=$(xcodebuild -workspace "$WORKSPACE_NAME" -list -json 2>/dev/null | python3 -c "import sys,json,os; data=json.load(sys.stdin); schemes=data.get('workspace',{}).get('schemes',[]); app=os.environ.get('APP_NAME',''); non_test=[s for s in schemes if not s.endswith('Tests') and not s.endswith('UITests')]; match=[s for s in non_test if s==app]; print(match[0] if match else (non_test[0] if non_test else (schemes[0] if schemes else '')))" 2>/dev/null || echo "")
          else
            SCHEME=$(xcodebuild -list -json 2>/dev/null | python3 -c "import sys,json,os; data=json.load(sys.stdin); schemes=data.get('project',{}).get('schemes',[]); app=os.environ.get('APP_NAME',''); non_test=[s for s in schemes if not s.endswith('Tests') and not s.endswith('UITests')]; match=[s for s in non_test if s==app]; print(match[0] if match else (non_test[0] if non_test else (schemes[0] if schemes else '')))" 2>/dev/null || echo "")
          fi

          if [ -z "$SCHEME" ]; then
            SCHEME="${APP_NAME:-WebViewApp}"
          fi
          echo "Using scheme: $SCHEME"

          # Get signing identity from keychain
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Apple Distribution\|iPhone Distribution" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ -z "$IDENTITY" ]; then
            IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          fi
          if [ -z "$IDENTITY" ]; then
            echo "ERROR: No codesigning identity found in keychain"
            security find-identity -v "$KEYCHAIN_PATH"
            exit 1
          fi
          echo "Using signing identity: $IDENTITY"

          BUILD_CMD="xcodebuild archive"
          if [ "$BUILD_TYPE" = "workspace" ]; then
            BUILD_CMD="$BUILD_CMD -workspace $WORKSPACE_NAME"
          else
            BUILD_CMD="$BUILD_CMD -project $PROJ_NAME"
          fi

          # ========== Phase 1: Build SIGNED archive ==========
          echo "=== Phase 1: Building signed archive ==="
          $BUILD_CMD \
            -scheme "$SCHEME" \
            -archivePath build/app.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="$IDENTITY" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            PROVISIONING_PROFILE_SPECIFIER="$PP_NAME" \
            2>&1 | tail -50

          echo "=== Archive contents ==="
          ls -la build/app.xcarchive/Products/Applications/ 2>/dev/null || echo "WARNING: No Applications directory found"

          APP_PATH=$(ls -d build/app.xcarchive/Products/Applications/*.app 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app bundle found in archive!"
            find build/app.xcarchive -maxdepth 3 -type d 2>/dev/null
            exit 1
          fi
          echo "Found app bundle: $APP_PATH"

          # Extract bundle ID from the built app for ExportOptions
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP_PATH/Info.plist")
          echo "Bundle ID: $BUNDLE_ID"

          # ========== Phase 2: Export IPA using xcodebuild ==========
          echo "=== Phase 2: Exporting IPA with xcodebuild -exportArchive ==="

          printf '%s\n' \
            '<?xml version="1.0" encoding="UTF-8"?>' \
            '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
            '<plist version="1.0">' \
            '<dict>' \
            '    <key>method</key>' \
            '    <string>ad-hoc</string>' \
            '    <key>teamID</key>' \
            "    <string>${TEAM_ID}</string>" \
            '    <key>signingStyle</key>' \
            '    <string>manual</string>' \
            '    <key>compileBitcode</key>' \
            '    <false/>' \
            '    <key>stripSwiftSymbols</key>' \
            '    <true/>' \
            '    <key>provisioningProfiles</key>' \
            '    <dict>' \
            "        <key>${BUNDLE_ID}</key>" \
            "        <string>${PP_NAME}</string>" \
            '    </dict>' \
            '</dict>' \
            '</plist>' > "$RUNNER_TEMP/ExportOptions.plist"

          echo "ExportOptions.plist:"
          cat "$RUNNER_TEMP/ExportOptions.plist"

          xcodebuild -exportArchive \
            -archivePath build/app.xcarchive \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath build/export \
            2>&1 | tail -30

          # Copy exported IPA
          IPA_FILE=$(ls build/export/*.ipa 2>/dev/null | head -1)
          if [ -z "$IPA_FILE" ]; then
            echo "ERROR: No IPA file found after export!"
            ls -la build/export/ 2>/dev/null
            exit 1
          fi

          cp "$IPA_FILE" app-release.ipa
          echo "=== IPA file created ==="
          ls -la app-release.ipa

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipa-release-${{ inputs.build_id }}
          path: source/${{ env.XCODE_DIR }}/app-release.ipa
          retention-days: 7

      - name: Cleanup Keychain
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi

      - name: Notify Callback
        if: always()
        run: |
          if [ -n "${{ inputs.callback_url }}" ]; then
            STATUS="${{ job.status }}"
            RUN_ID="${{ github.run_id }}"

            curl -X POST "${{ inputs.callback_url }}" \
              -H "Content-Type: application/json" \
              -d "{\"status\": \"$STATUS\", \"run_id\": \"$RUN_ID\", \"artifact_url\": \"\"}" \
              --max-time 30 || echo "Callback failed (non-critical)"
          fi
