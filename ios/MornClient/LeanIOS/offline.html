<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Offline</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; background: #f5f5f7; color: #1d1d1f;
        }
        .container { text-align: center; padding: 40px; }
        .icon { font-size: 64px; margin-bottom: 20px; }
        h1 { font-size: 24px; font-weight: 600; margin-bottom: 10px; }
        p { font-size: 16px; color: #86868b; margin-bottom: 24px; }
        button {
            background: #0071e3; color: white; border: none; padding: 12px 32px;
            border-radius: 22px; font-size: 16px; cursor: pointer;
        }
        button:active { background: #0060c0; }
        @media (prefers-color-scheme: dark) {
            body { background: #1d1d1f; color: #f5f5f7; }
            p { color: #86868b; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📡</div>
        <h1>No Connection</h1>
        <p>Please check your internet connection and try again.</p>
        <button onclick="window.location.reload()">Try Again</button>
    </div>
</body>
</html>
